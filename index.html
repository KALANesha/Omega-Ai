<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omega AI</title>
    <style>
        /* Black & Blue Theme */
        
        body {
            background: #050505;
            color: #00d2ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        /* Omega Avatar Interface */
        
        #omega-avatar {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 90px;
            height: 90px;
            border: 3px solid #00d2ff;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px #00d2ff;
            background: #000;
            z-index: 100;
        }
        
        .eyes {
            display: flex;
            gap: 12px;
        }
        
        .eye {
            width: 14px;
            height: 14px;
            background: #00d2ff;
            border-radius: 50%;
            transition: 0.2s;
            box-shadow: 0 0 10px #00d2ff;
        }
        
        .mouth {
            width: 35px;
            height: 5px;
            background: #00d2ff;
            margin-top: 15px;
            border-radius: 5px;
            transition: 0.3s;
            box-shadow: 0 0 5px #00d2ff;
        }
        /* Avatar Emotions */
        
        .thinking .eye {
            transform: scaleY(0.1);
        }
        
        .talking .mouth {
            height: 18px;
            border-radius: 50%;
        }
        
        .happy .mouth {
            height: 12px;
            border-radius: 0 0 20px 20px;
        }
        /* Chat Layout */
        
        header {
            padding: 15px;
            background: #000;
            border-bottom: 1px solid #111;
            text-align: center;
        }
        
        header h1 {
            margin: 0;
            font-size: 22px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00d2ff;
        }
        
        #chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
        }
        
        .msg {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 15px;
            line-height: 1.5;
            font-size: 15px;
        }
        
        .user-msg {
            background: #003366;
            align-self: flex-end;
            color: white;
            border-bottom-right-radius: 2px;
        }
        
        .ai-msg {
            background: #111;
            border: 1px solid #00d2ff;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }
        /* Input Controls */
        
        .input-box {
            display: flex;
            padding: 20px;
            background: #080808;
            gap: 10px;
            border-top: 1px solid #222;
        }
        
        input {
            flex: 1;
            background: #111;
            border: 1px solid #00d2ff;
            color: #fff;
            padding: 12px 20px;
            border-radius: 30px;
            outline: none;
            font-size: 16px;
        }
        
        button {
            background: #00d2ff;
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        
        button:hover {
            background: #fff;
            box-shadow: 0 0 15px #fff;
        }
    </style>
</head>

<body>

    <header>
        <h1>OMEGA AI</h1>
    </header>

    <div id="omega-avatar">
        <div class="eyes">
            <div class="eye"></div>
            <div class="eye"></div>
        </div>
        <div class="mouth"></div>
    </div>

    <div id="chat-area">
        <div class="msg ai-msg">Greetings. I am <b>OMEGA</b>. How can I assist you today? <br><small>Tip: Use <b>/image</b> to generate visuals.</small></div>
    </div>

    <div class="input-box">
        <input type="text" id="userInput" placeholder="Command Omega...">
        <button onclick="send()">SEND</button>
    </div>

    <script>
        const chatArea = document.getElementById('chat-area');
        const avatar = document.getElementById('omega-avatar');

        async function send() {
            const input = document.getElementById('userInput').value;
            if (!input) return;

            addMsg(input, 'user-msg');
            document.getElementById('userInput').value = "";
            setEmotion('thinking');

            if (input.toLowerCase().startsWith('/image')) {
                // Omega Image Generation
                const prompt = input.replace('/image', '').trim();
                const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=1024&height=1024&nologo=true`;
                addMsg(`Generating visual for: <i>${prompt}</i>...<br><img src="${imgUrl}" style="width:100%; border-radius:12px; margin-top:10px; border: 1px solid #00d2ff;">`, 'ai-msg');
                setEmotion('happy');
            } else {
                // Omega Text Chat
                try {
                    const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(input)}`);
                    const aiText = await response.text();

                    addMsg(aiText, 'ai-msg');
                    speak(aiText);
                } catch (e) {
                    addMsg("System Error: Unable to reach Omega core.", 'ai-msg');
                }
            }
        }

        function addMsg(content, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerHTML = content;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function setEmotion(e) {
            avatar.className = e;
            if (e === 'thinking') setTimeout(() => avatar.className = '', 2000);
        }

        function speak(text) {
            avatar.className = 'talking';
            const speech = new SpeechSynthesisUtterance(text);

            // උත්තරය කියවන කොට කට හොලවන්න
            speech.onend = () => avatar.className = '';
            window.speechSynthesis.speak(speech);
        }

        // Enter කී එකෙන් මැසේජ් එක යවන්න
        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') send();
        });
    </script>

</body>

</html>
