<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMEGA AI</title>
    <style>
        /* Design එක (CSS) */
        
        body {
            background: #000;
            color: #00d2ff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        header {
            padding: 15px;
            background: #080808;
            border-bottom: 1px solid #1a1a1a;
            text-align: center;
        }
        
        #chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .msg {
            max-width: 80%;
            padding: 12px;
            border-radius: 12px;
            font-size: 15px;
        }
        
        .user-msg {
            background: #003366;
            align-self: flex-end;
            color: white;
        }
        
        .ai-msg {
            background: #111;
            border: 1px solid #00d2ff;
            align-self: flex-start;
        }
        
        .input-box {
            display: flex;
            padding: 20px;
            background: #050505;
            gap: 10px;
            border-top: 1px solid #222;
        }
        
        input {
            flex: 1;
            background: #111;
            border: 1px solid #00d2ff;
            color: #fff;
            padding: 12px;
            border-radius: 25px;
            outline: none;
        }
        
        button {
            background: #00d2ff;
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        
        #avatar {
            position: fixed;
            top: 15px;
            right: 20px;
            width: 60px;
            height: 60px;
            border: 2px solid #00d2ff;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #000;
            box-shadow: 0 0 10px #00d2ff;
        }
        
        .eye {
            width: 10px;
            height: 10px;
            background: #00d2ff;
            border-radius: 50%;
            margin: 2px;
            display: inline-block;
        }
        
        .mouth {
            width: 20px;
            height: 3px;
            background: #00d2ff;
            margin-top: 8px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <header>
        <h1>OMEGA AI</h1>
    </header>

    <div id="avatar">
        <div>
            <div class="eye"></div>
            <div class="eye"></div>
        </div>
        <div class="mouth"></div>
    </div>

    <div id="chat-area">
        <div class="msg ai-msg">System Active. I am OMEGA. Ready for your command.</div>
    </div>

    <div class="input-box">
        <input type="text" id="userInput" placeholder="Ask Omega..." autocomplete="off">
        <button onclick="sendMsg()">SEND</button>
    </div>

    <script>
        const chatArea = document.getElementById('chat-area');

        async function sendMsg() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();

            if (!text) return;

            // User ගේ මැසේජ් එක Screen එකට දානවා
            const userDiv = document.createElement('div');
            userDiv.className = 'msg user-msg';
            userDiv.innerText = text;
            chatArea.appendChild(userDiv);

            input.value = ""; // Input එක හිස් කරනවා
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                // AI එකෙන් උත්තරයක් ගේනවා
                const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(text)}`);
                const aiText = await response.text();

                // AI ගේ මැසේජ් එක Screen එකට දානවා
                const aiDiv = document.createElement('div');
                aiDiv.className = 'msg ai-msg';
                aiDiv.innerText = aiText;
                chatArea.appendChild(aiDiv);

                chatArea.scrollTop = chatArea.scrollHeight;
            } catch (e) {
                console.error("Error:", e);
            }
        }

        // Enter ගැහුවත් මැසේජ් එක යන්න මේක උදව් වෙනවා
        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMsg();
        });
    </script>

</body>

</html>
