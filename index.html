<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMEGA AI - Next Gen Assistant</title>
    <style>
        /* Omega Black & Blue Theme */
        
        body {
            background: #000000;
            color: #00d2ff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        /* OMEGA Avatar Interface */
        
        #omega-avatar {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 80px;
            height: 80px;
            border: 2px solid #00d2ff;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px #00d2ff;
            background: #000;
            z-index: 1000;
        }
        
        .eyes {
            display: flex;
            gap: 10px;
        }
        
        .eye {
            width: 12px;
            height: 12px;
            background: #00d2ff;
            border-radius: 50%;
            transition: 0.2s;
            box-shadow: 0 0 8px #00d2ff;
        }
        
        .mouth {
            width: 30px;
            height: 4px;
            background: #00d2ff;
            margin-top: 15px;
            border-radius: 5px;
            transition: 0.3s;
        }
        /* Avatar Emotions */
        
        .thinking .eye {
            transform: scaleY(0.1);
        }
        
        .talking .mouth {
            height: 12px;
            border-radius: 50%;
        }
        
        header {
            padding: 15px;
            background: #080808;
            border-bottom: 1px solid #1a1a1a;
            text-align: center;
        }
        
        header h1 {
            margin: 0;
            font-size: 22px;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #00d2ff;
        }
        
        #chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
        }
        
        .msg {
            max-width: 80%;
            padding: 12px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.4;
        }
        
        .user-msg {
            background: #003366;
            align-self: flex-end;
            color: white;
            border-bottom-right-radius: 2px;
        }
        
        .ai-msg {
            background: #111;
            border: 1px solid #00d2ff;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }
        
        .input-box {
            display: flex;
            padding: 20px;
            background: #050505;
            gap: 10px;
            border-top: 1px solid #222;
        }
        
        input {
            flex: 1;
            background: #111;
            border: 1px solid #00d2ff;
            color: #fff;
            padding: 12px;
            border-radius: 25px;
            outline: none;
        }
        
        button {
            background: #00d2ff;
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        
        img {
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
            border: 1px solid #00d2ff;
        }
    </style>
</head>

<body>

    <header>
        <h1>OMEGA AI</h1>
    </header>

    <div id="omega-avatar">
        <div class="eyes">
            <div class="eye"></div>
            <div class="eye"></div>
        </div>
        <div class="mouth"></div>
    </div>

    <div id="chat-area">
        <div class="msg ai-msg">System Online. I am <b>OMEGA</b>. Ready to assist.</div>
    </div>

    <div class="input-box">
        <input type="text" id="userInput" placeholder="Type command..." autocomplete="off">
        <button onclick="send()">SEND</button>
    </div>
