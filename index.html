<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMEGA AI - Next Gen Assistant</title>
    <style>
        /* Omega Black & Blue Futuristic Theme */
        
        body {
            background: #000000;
            color: #00d2ff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        /* OMEGA Avatar Interface */
        
        #omega-avatar {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 85px;
            height: 85px;
            border: 2px solid #00d2ff;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px #00d2ff, inset 0 0 10px #00d2ff;
            background: #000;
            z-index: 1000;
            transition: 0.3s;
        }
        
        .eyes {
            display: flex;
            gap: 12px;
        }
        
        .eye {
            width: 12px;
            height: 12px;
            background: #00d2ff;
            border-radius: 50%;
            transition: 0.2s;
            box-shadow: 0 0 8px #00d2ff;
        }
        
        .mouth {
            width: 32px;
            height: 4px;
            background: #00d2ff;
            margin-top: 15px;
            border-radius: 5px;
            transition: 0.3s;
            box-shadow: 0 0 5px #00d2ff;
        }
        /* Avatar States */
        
        .thinking .eye {
            transform: scaleY(0.1);
        }
        
        .talking .mouth {
            height: 16px;
            border-radius: 50%;
        }
        
        .error-state {
            border-color: #ff0044 !important;
            box-shadow: 0 0 15px #ff0044 !important;
        }
        
        .error-state .eye,
        .error-state .mouth {
            background: #ff0044 !important;
            box-shadow: 0 0 8px #ff0044 !important;
        }
        /* Chat Layout */
        
        header {
            padding: 15px;
            background: #080808;
            border-bottom: 1px solid #1a1a1a;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }
        
        header h1 {
            margin: 0;
            font-size: 20px;
            letter-spacing: 4px;
            font-weight: 300;
            text-shadow: 0 0 10px #00d2ff;
        }
        
        #chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }
        
        .msg {
            max-width: 85%;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.6;
            word-wrap: break-word;
        }
        
        .user-msg {
            background: #002b4d;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            border: 1px solid #0056b3;
        }
        
        .ai-msg {
            background: #0a0a0a;
            border: 1px solid #00d2ff;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }
        /* Input Bar */
        
        .input-box {
            display: flex;
            padding: 20px;
            background: #050505;
            gap: 10px;
            border-top: 1px solid #1a1a1a;
        }
        
        input {
            flex: 1;
            background: #111;
            border: 1px solid #333;
            color: #00d2ff;
            padding: 12px 20px;
            border-radius: 25px;
            outline: none;
            font-size: 15px;
            transition: 0.3s;
        }
        
        input:focus {
            border-color: #00d2ff;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }
        
        button {
            background: #00d2ff;
            color: #000;
            border: none;
            padding: 0 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }
        
        button:hover {
            background: #fff;
            box-shadow: 0 0 20px #fff;
            transform: scale(1.05);
        }
        /* Scrollbar */
        
        #chat-area::-webkit-scrollbar {
            width: 5px;
        }
        
        #chat-area::-webkit-scrollbar-thumb {
            background: #111;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <header>
        <h1>OMEGA CORE</h1>
    </header>

    <div id="omega-avatar">
        <div class="eyes">
            <div class="eye"></div>
            <div class="eye"></div>
        </div>
        <div class="mouth"></div>
    </div>

    <div id="chat-area">

    <div class="input-box">
        <input type="text" id="userInput" placeholder="Initiate command..." autocomplete="off">
        <button onclick="send()">Send</button>
    </div>
