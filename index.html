<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMEGA AI | Eshan Creative Studio</title>
    <style>
         :root {
            --glow-color: #00d2ff;
            --bg-color: #050505;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--glow-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        /* --- OMEGA INTERFACE --- */
        
        #omega-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background: linear-gradient(180deg, #000 0%, #050505 100%);
            border-bottom: 1px solid #111;
        }
        
        #omega-face {
            width: 110px;
            height: 110px;
            border: 2px solid var(--glow-color);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px var(--glow-color), inset 0 0 10px var(--glow-color);
            background: #000;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .eyes {
            display: flex;
            gap: 20px;
        }
        
        .eye {
            width: 16px;
            height: 16px;
            background: var(--glow-color);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--glow-color);
            transition: 0.2s;
        }
        
        .mouth {
            width: 45px;
            height: 4px;
            background: var(--glow-color);
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px var(--glow-color);
            transition: 0.3s;
        }
        /* Status Animations */
        
        .thinking .eye {
            transform: scaleY(0.1);
        }
        
        .thinking #omega-face {
            box-shadow: 0 0 30px #fff;
            border-color: #fff;
        }
        
        .talking .mouth {
            height: 15px;
            border-radius: 50%;
            transform: scale(1.1);
        }
        /* --- CHAT SYSTEM --- */
        
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }
        
        .message {
            max-width: 75%;
            padding: 15px 20px;
            border-radius: 15px;
            font-size: 16px;
            line-height: 1.6;
            animation: fadeIn 0.4s ease;
        }
        
        .user-msg {
            background: rgba(0, 210, 255, 0.1);
            align-self: flex-end;
            border: 1px solid var(--glow-color);
            border-bottom-right-radius: 2px;
            color: #fff;
        }
        
        .ai-msg {
            background: #111;
            align-self: flex-start;
            border: 1px solid #222;
            border-bottom-left-radius: 2px;
        }
        /* --- INPUT BAR --- */
        
        .input-wrapper {
            padding: 25px;
            background: #000;
            display: flex;
            gap: 15px;
            border-top: 1px solid #111;
        }
        
        input {
            flex: 1;
            background: #0a0a0a;
            border: 1px solid #222;
            color: #fff;
            padding: 15px 25px;
            border-radius: 30px;
            outline: none;
            font-size: 16px;
            transition: 0.3s;
        }
        
        input:focus {
            border-color: var(--glow-color);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }
        
        button {
            background: var(--glow-color);
            color: #000;
            border: none;
            padding: 0 30px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        button:hover {
            background: #fff;
            box-shadow: 0 0 20px #fff;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div id="omega-container">
        <div id="omega-face">
            <div class="eyes">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
            <div class="mouth"></div>
        </div>
        <h2 style="font-size: 14px; letter-spacing: 4px; margin-top: 15px; opacity: 0.7;">OMEGA CORE v2.0</h2>
    </div>

    <div id="chat-window" id="style-1">
        <div class="message ai-msg">
            <b>OMEGA:</b> System initialized. Neural links established. <br> Welcome, sir. How can I assist your creative process today?
        </div>
    </div>

    <div class="input-wrapper">
        <input type="text" id="userInput" placeholder="Enter command..." autocomplete="off">
        <button onclick="handleResponse()">Execute</button>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const face = document.getElementById('omega-face');
        const inputField = document.getElementById('userInput');

        async function handleResponse() {
            const query = inputField.value.trim();
            if (!query) return;

            // User Message
            appendMessage(query, 'user-msg');
            inputField.value = "";
            face.className = "thinking";

            try {
                // මෙතනදී අපි වඩාත් Professional API Proxy එකක් පාවිච්චි කරනවා
                const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(query)}?model=openai&system=You are OMEGA, a professional, futuristic AI assistant created by Eshan Creative Studio. Always be helpful, cool, and direct.`);

                if (!response.ok) throw new Error("API_LIMIT");

                const data = await response.text();

                face.className = "talking";
                appendMessage("<b>OMEGA:</b> " + data, 'ai-msg');

                // Text to Speech (අත්‍යවශ්‍ය නම්)
                const speech = new SpeechSynthesisUtterance(data);
                speech.onend = () => face.className = "";
                window.speechSynthesis.speak(speech);

            } catch (error) {
                face.className = "";
                appendMessage("<b>OMEGA:</b> Local core interference detected. Connection reset. Please verify your network uplink.", 'ai-msg');
            }
        }

        function appendMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleResponse();
        });
    </script>

</body>

</html>
