<!DOCTYPE html>
<html>

<head>
    <title>OMEGA AI</title>
    <style>
        body {
            background: #000;
            color: #00d2ff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
        }
        
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .msg {
            margin: 10px;
            padding: 10px;
            border-radius: 10px;
            max-width: 80%;
        }
        
        .user {
            background: #003366;
            align-self: flex-end;
        }
        
        .ai {
            background: #111;
            border: 1px solid #00d2ff;
            align-self: flex-start;
        }
        
        .input-area {
            padding: 20px;
            display: flex;
            background: #080808;
            gap: 10px;
        }
        
        input {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #00d2ff;
            background: #111;
            color: #fff;
            outline: none;
        }
        
        button {
            padding: 10px 20px;
            border-radius: 20px;
            background: #00d2ff;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div id="chat">
        <div class="msg ai">OMEGA System Online. Type your message below.</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type here...">
        <button onclick="askOmega()">SEND</button>
    </div>

    <script>
        async function askOmega() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const text = input.value.trim();

            if (!text) return;

            // User message
            const userDiv = document.createElement('div');
            userDiv.className = 'msg user';
            userDiv.innerText = text;
            chat.appendChild(userDiv);
            input.value = "";

            try {
                // AI Response
                const response = await fetch('https://text.pollinations.ai/' + encodeURIComponent(text));
                const aiText = await response.text();

                const aiDiv = document.createElement('div');
                aiDiv.className = 'msg ai';
                aiDiv.innerText = aiText;
                chat.appendChild(aiDiv);
                chat.scrollTop = chat.scrollHeight;
            } catch (e) {
                alert("Error: " + e);
            }
        }
    </script>

</body>

</html>
