<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMEGA AI - Eshan Creative Studio</title>
    <style>
        /* Black & Blue Theme */
        
        body {
            background: #000000;
            color: #00d2ff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        /* OMEGA Face UI */
        
        #omega-face {
            width: 100px;
            height: 100px;
            border: 3px solid #00d2ff;
            border-radius: 50%;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px #00d2ff;
            background: #050505;
            transition: 0.3s;
        }
        
        .eyes {
            display: flex;
            gap: 15px;
        }
        
        .eye {
            width: 15px;
            height: 15px;
            background: #00d2ff;
            border-radius: 50%;
            box-shadow: 0 0 10px #00d2ff;
            transition: 0.2s;
        }
        
        .mouth {
            width: 40px;
            height: 5px;
            background: #00d2ff;
            margin-top: 15px;
            border-radius: 5px;
            box-shadow: 0 0 8px #00d2ff;
            transition: 0.3s;
        }
        /* Animations */
        
        .thinking .eye {
            transform: scaleY(0.1);
        }
        
        .talking .mouth {
            height: 15px;
            border-radius: 50%;
        }
        
        header {
            text-align: center;
            padding: 10px;
            border-bottom: 1px solid #111;
        }
        
        header h1 {
            font-size: 24px;
            letter-spacing: 5px;
            margin: 0;
            text-shadow: 0 0 10px #00d2ff;
        }
        
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .msg {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 15px;
            font-size: 15px;
            line-height: 1.5;
        }
        
        .user-msg {
            background: #002244;
            align-self: flex-end;
            border: 1px solid #004488;
        }
        
        .ai-msg {
            background: #0a0a0a;
            border: 1px solid #00d2ff;
            align-self: flex-start;
        }
        
        .input-area {
            display: flex;
            padding: 20px;
            background: #050505;
            gap: 10px;
            border-top: 1px solid #222;
        }
        
        input {
            flex: 1;
            background: #111;
            border: 1px solid #00d2ff;
            color: #fff;
            padding: 12px 20px;
            border-radius: 30px;
            outline: none;
        }
        
        button {
            background: #00d2ff;
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <header>
        <h1>OMEGA CORE</h1>
    </header>

    <div id="omega-face">
        <div class="eyes">
            <div class="eye"></div>
            <div class="eye"></div>
        </div>
        <div class="mouth"></div>
    </div>

    <div id="chat-box">
        <div class="msg ai-msg"><b>OMEGA:</b> Online and ready. System is stabilized. How can I help you today?</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Give a command to Omega...">
        <button onclick="askOmega()">SEND</button>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const face = document.getElementById('omega-face');

        async function askOmega() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();

            if (!text) return;

            // User Message
            addMessage(text, 'user-msg');
            input.value = "";
            face.className = "thinking";

            try {
                // වඩාත් විශ්වාසවන්ත DuckDuckGo AI Proxy එකක් පාවිච්චි කරමු
                const response = await fetch(`https://api.duckduckgo.com/api/?q=${encodeURIComponent(text)}&format=json&no_html=1&skip_disambig=1`);
                const data = await response.json();

                let reply = data.AbstractText || "I am analyzing the data. Could you please provide more details?";

                // Backup - JSON එකේ දත්ත නැතිනම් පොදු පිළිතුරක්
                if (reply.length < 5) reply = "Omega Core: Input received. I am processing your request through Eshan Creative Studio servers.";

                addMessage("<b>OMEGA:</b> " + reply, 'ai-msg');
                animateTalk();

            } catch (e) {
                addMessage("<b>OMEGA:</b> Connection reset by host. Reconnecting to local core...", 'ai-msg');
                face.className = "";
            }
        }

        function addMessage(content, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerHTML = content;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function animateTalk() {
            face.className = "talking";
            setTimeout(() => {
                face.className = "";
            }, 2000);
        }

        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') askOmega();
        });
    </script>

</body>

</html>
