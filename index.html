<!DOCTYPE html>
<html>

<head>
    <title>OMEGA AI</title>
    <style>
        body {
            background: #000;
            color: #00d2ff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
        }
        
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .msg {
            padding: 12px;
            border-radius: 15px;
            max-width: 80%;
            line-height: 1.5;
            font-size: 15px;
        }
        
        .user {
            background: #003366;
            align-self: flex-end;
            border: 1px solid #0055ff;
        }
        
        .ai {
            background: #111;
            border: 1px solid #00d2ff;
            align-self: flex-start;
        }
        
        .input-area {
            padding: 20px;
            display: flex;
            background: #080808;
            gap: 10px;
            border-top: 1px solid #222;
        }
        
        input {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
            border: 1px solid #00d2ff;
            background: #111;
            color: #fff;
            outline: none;
        }
        
        button {
            padding: 10px 25px;
            border-radius: 25px;
            background: #00d2ff;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        
        button:hover {
            background: #fff;
            box-shadow: 0 0 10px #fff;
        }
    </style>
</head>

<body>

    <div id="chat">
        <div class="msg ai"><b>OMEGA:</b> System Stabilized. How can I assist you today?</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask Omega something...">
        <button onclick="askOmega()">SEND</button>
    </div>

    <script>
        async function askOmega() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const text = input.value.trim();

            if (!text) return;

            // User message පෙන්වීම
            const userDiv = document.createElement('div');
            userDiv.className = 'msg user';
            userDiv.innerText = text;
            chat.appendChild(userDiv);
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            try {
                // අපි මේ පාර වෙනස්ම API එකක් පාවිච්චි කරනවා
                const response = await fetch(`https://api.duckduckgo.com/api/?q=${encodeURIComponent(text)}&format=json`);
                const data = await response.json();

                let aiText = data.AbstractText || "I'm processing that. Could you be more specific?";

                const aiDiv = document.createElement('div');
                aiDiv.className = 'msg ai';
                aiDiv.innerHTML = "<b>OMEGA:</b> " + aiText;
                chat.appendChild(aiDiv);
                chat.scrollTop = chat.scrollHeight;

            } catch (e) {
                // පරණ API එකත් backup එකක් විදියට තියමු
                const aiDiv = document.createElement('div');
                aiDiv.className = 'msg ai';
                aiDiv.innerText = "OMEGA: Connection Reset. Please check your internet or try a different question.";
                chat.appendChild(aiDiv);
            }
        }

        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') askOmega();
        });
    </script>

</body>

</html>
